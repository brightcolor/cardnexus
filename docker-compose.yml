services:
  cardnexus:
    image: ghcr.io/brightcolor/cardnexus:main
    container_name: cardnexus
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/public/uploads
    # REVERSE PROXY NOTE: The proxy MUST pass these headers to avoid redirect loops:
    #   X-Forwarded-Proto: https
    #   X-Forwarded-Host:  yourdomain.com
    # Nginx example:
    #   proxy_set_header X-Forwarded-Proto $scheme;
    #   proxy_set_header X-Forwarded-Host  $host;
    environment:
      # Required: generate with: openssl rand -base64 32
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: file:/app/data/app.db
      # Stripe — leave STRIPE_SECRET_KEY empty to disable payments
      STRIPE_SECRET_KEY:             ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:         ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY:      ${STRIPE_PRICE_PRO_MONTHLY:-}
      STRIPE_PRICE_BUSINESS_MONTHLY: ${STRIPE_PRICE_BUSINESS_MONTHLY:-}
      # PayPal — leave PAYPAL_CLIENT_ID empty to disable PayPal payments
      PAYPAL_CLIENT_ID:              ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET:          ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_PLAN_PRO_MONTHLY:       ${PAYPAL_PLAN_PRO_MONTHLY:-}
      PAYPAL_PLAN_BUSINESS_MONTHLY:  ${PAYPAL_PLAN_BUSINESS_MONTHLY:-}
      PAYPAL_WEBHOOK_ID:             ${PAYPAL_WEBHOOK_ID:-}
      PAYPAL_MODE:                   ${PAYPAL_MODE:-sandbox}
      # SMTP — leave SMTP_HOST empty to disable email sending
      SMTP_HOST:   ${SMTP_HOST:-}
      SMTP_PORT:   ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER:   ${SMTP_USER:-}
      SMTP_PASS:   ${SMTP_PASS:-}
      SMTP_FROM:   ${SMTP_FROM:-CardNexus <noreply@cardnexus.app>}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

