services:
  cardnexus:
    image: ghcr.io/brightcolor/cardnexus:main
    container_name: cardnexus
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - cardnexus-db:/app/data
      - cardnexus-uploads:/app/public/uploads
    environment:
      # Required: generate with: openssl rand -base64 32
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: file:/app/data/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cardnexus-db:
  cardnexus-uploads:
